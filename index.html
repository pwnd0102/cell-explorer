<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cell Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Sarabun', 'Prompt', -apple-system, 'Segoe UI', sans-serif; background: #f5f5f0; overflow: hidden; height: 100vh; color: #1a1a1a; }
#container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
.header { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: 2px; color: #222; }
.header h1 span { font-weight: 300; opacity: 0.5; }
.header p { font-size: 12px; color: rgba(0,0,0,0.3); margin-top: 4px; letter-spacing: 1px; }
.toggle-wrap { position: fixed; top: 76px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 0; background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.06); border-radius: 30px; padding: 3px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.toggle-btn { padding: 7px 20px; border: none; background: transparent; border-radius: 26px; font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.4); cursor: pointer; transition: all 0.3s; font-family: inherit; letter-spacing: 0.5px; }
.toggle-btn.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
.toggle-btn:hover:not(.active) { color: rgba(0,0,0,0.6); }
.info-panel { position: fixed; right: -420px; top: 0; width: 400px; height: 100%; z-index: 20; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-left: 1px solid rgba(0,0,0,0.06); padding: 32px; overflow-y: auto; transition: right 0.5s cubic-bezier(0.16,1,0.3,1); box-shadow: -10px 0 40px rgba(0,0,0,0.04); }
.info-panel.open { right: 0; }
.info-panel .close { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(0,0,0,0.05); cursor: pointer; font-size: 16px; color: rgba(0,0,0,0.4); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.info-panel .close:hover { background: rgba(0,0,0,0.1); color: #000; }
.info-panel .org-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
.info-panel .org-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.info-panel .en-name { font-size: 15px; font-weight: 500; color: rgba(0,0,0,0.55); margin-bottom: 4px; }
.info-panel .org-pronounce { font-size: 13px; color: rgba(0,0,0,0.35); margin-bottom: 16px; font-style: italic; }
.info-panel .org-section { margin-bottom: 20px; }
.info-panel .org-section label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(0,0,0,0.3); display: block; margin-bottom: 6px; }
.info-panel .org-section p { font-size: 14px; line-height: 1.7; color: rgba(0,0,0,0.75); }
.info-panel .en-name { font-size: 13px; color: rgba(0,0,0,0.3); margin-bottom: 20px; }
.close-panel-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 15; background: transparent; display: none; }
.close-panel-overlay.show { display: block; }
.legend { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 90vw; }
.legend-item { display: flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); border-radius: 20px; border: 1px solid rgba(0,0,0,0.04); font-size: 11px; color: rgba(0,0,0,0.5); cursor: pointer; transition: all 0.2s; }
.legend-item:hover { background: rgba(255,255,255,0.8); color: rgba(0,0,0,0.7); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-divider { width: 1px; height: 16px; background: rgba(0,0,0,0.08); margin: 0 4px; }
.toast { position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-10px); z-index: 30; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); color: #fff; padding: 10px 24px; border-radius: 30px; font-size: 13px; opacity: 0; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (max-width: 700px) {
.info-panel { width: 100%; right: -100%; padding: 24px; }
.header h1 { font-size: 15px; }
.toggle-btn { padding: 6px 14px; font-size: 12px; }
.legend { bottom: 14px; gap: 4px; }
.legend-item { font-size: 10px; padding: 3px 8px; }
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
</style>
</head>
<body>

<div id="container"></div>

<div class="header">
  <h1>🧬 <span>3D</span> Cell Explorer</h1>
  <p>คลิกออแกเนลล์เพื่อดูรายละเอียด • กด Space เพื่อคลิก • ลากหมุนดู</p>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn active" data-type="animal">🐾 เซลล์สัตว์</button>
  <button class="toggle-btn" data-type="plant">🌱 เซลล์พืช</button>
</div>

<div class="close-panel-overlay" id="panelOverlay"></div>

<div class="info-panel" id="infoPanel">
  <button class="close" id="closePanel">✕</button>
  <div id="panelContent">
    <div class="org-icon" id="pIcon" style="background: rgba(0,0,0,0.05);">🔬</div>
    <div class="org-name" id="pName">ชื่อออแกเนลล์</div>
    <div class="en-name" id="pEnName">English name</div>
    <div class="org-pronounce" id="pPronounce">คำอ่าน</div>
    <div class="org-section">
      <label>หน้าที่</label>
      <p id="pFunction">รายละเอียดหน้าที่</p>
    </div>
    <div class="org-section">
      <label>โครงสร้าง</label>
      <p id="pStructure">รายละเอียดโครงสร้าง</p>
    </div>
    <div class="org-section">
      <label>ข้อเท็จจริง</label>
      <p id="pFact">ข้อเท็จจริงน่ารู้</p>
    </div>
  </div>
</div>

<div class="legend" id="legend"></div>

<div class="toast" id="toast"></div>

// Merge shared organelles

DATA.plant.nucleolus = DATA.animal.nucleolus;
DATA.plant.mitochondria = DATA.animal.mitochondria;
DATA.plant.roughER = DATA.animal.roughER;
DATA.plant.smoothER = DATA.animal.smoothER;
DATA.plant.golgi = DATA.animal.golgi;
DATA.plant.ribosome = DATA.animal.ribosome;
DATA.plant.membrane = { ...DATA.animal.membrane,
  func: "ควบคุมการผ่านเข้าออกของสาร เช่นเดียวกับเซลล์สัตว์ แต่ในพืชมีผนังเซลล์หุ้มอีกชั้นนอกเยื่อหุ้มเซลล์",
  struct: "เหมือนเซลล์สัตว์ คือฟอสโฟลิพิด bilayer มีโปรตีนแทรก แต่ไม่มีคอเลสเตอรอล มีสเตอรอลชนิดอื่นแทน",
  fact: "เยื่อหุ้มเซลล์พืชอยู่ด้านในของผนังเซลล์ ทำหน้าที่ควบคุมการผ่านเข้าออกร่วมกับพลาสโมเดสมาตา"
};

const COLORS = {
  nucleus: 0x6c5ce7, nucleolus: 0xe84393, mitochondria: 0xe17055,
  roughER: 0x00b894, smoothER: 0x00cec9, golgi: 0x0984e3,
  ribosome: 0xfd79a8, lysosome: 0xd63031, peroxisome: 0x6c5ce7,
  centriole: 0x636e72, membrane: 0xb2bec3, cellWall: 0xb2bec3,
  chloroplast: 0x00b894, vacuole: 0x74b9ff, plasmodesmata: 0x636e72,
  microtubule: 0xdfe6e9
};

// --- THREE.JS SETUP ---
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f0);

const W = container.clientWidth, H = container.clientHeight;
const camera = new THREE.PerspectiveCamera(30, W/H, 0.01, 100);
camera.position.set(6, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.2;
controls.maxDistance = 15;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;
controls.target.set(0, 0, 0);

// --- LIGHTS ---
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const main = new THREE.DirectionalLight(0xffffff, 2.5);
main.position.set(6, 10, 6); main.castShadow = true; scene.add(main);
const fill = new THREE.DirectionalLight(0xe8d5c0, 1.2);
fill.position.set(-5, 3, 7); scene.add(fill);
const rim = new THREE.DirectionalLight(0xc0d5e8, 0.8);
rim.position.set(-3, 2, -9); scene.add(rim);
scene.add(new THREE.HemisphereLight(0xe8ddd0, 0x1a1a1a, 0.6));

// --- STATE ---
let cellType = 'animal';
let cellGroup = new THREE.Group();
scene.add(cellGroup);
let clickables = [];
let selectedId = null;
let ribosomes = [];
let ribosomeParticles = [];
let vesicleParticles = [];
let chloroplasts = [];
let microtubules = [];
let animTime = 0;

// --- MATERIALS ---
function mat(color, opts = {}) {
  return new THREE.MeshPhysicalMaterial({
    color, metalness: opts.metalness || 0.1, roughness: opts.roughness || 0.3,
    transparent: opts.transparent || false, opacity: opts.opacity || 1,
    clearcoat: opts.clearcoat || 0.1, clearcoatRoughness: 0.2,
    ...opts
  });
}

// --- BUILD CELL ---
function buildCell(type) {
  while(cellGroup.children.length) cellGroup.remove(cellGroup.children[0]);
  clickables = []; ribosomes = []; ribosomeParticles = []; vesicleParticles = [];
  chloroplasts = []; microtubules = [];
  const g = cellGroup;

  const R = 2.0;

  // Ground shadow
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.ShadowMaterial({opacity:0.08}));
  ground.rotation.x = -Math.PI/2; ground.position.y = -R-0.2; ground.receiveShadow = true;
  g.add(ground);

  // Microtubules / Cytoskeleton
  const mtGroup = new THREE.Group();
  const mtMat = new THREE.MeshPhysicalMaterial({color:0xdfe6e9, transparent:true, opacity:0.15, roughness:0.6});
  for (let i = 0; i < 40; i++) {
    const len = 0.3 + Math.random() * 1.5;
    const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, len, 4), mtMat);
    const theta = Math.random() * Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 0.4 + Math.random() * (R*0.6);
    tube.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
    tube.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize());
    mtGroup.add(tube);
  }
  g.add(mtGroup);
  microtubules = mtGroup;

  // Cell Membrane (outer sphere)
  const membraneMat = new THREE.MeshPhysicalMaterial({
    color:0xb2bec3, transparent:true, opacity:0.06, roughness:0.1, metalness:0.0,
    side: THREE.DoubleSide, depthWrite: false
  });
  const membrane = new THREE.Mesh(new THREE.SphereGeometry(R, 32, 32), membraneMat);
  membrane.position.set(0,0,0);
  const wireMat = new THREE.MeshBasicMaterial({color:0xb2bec3, wireframe:true, transparent:true, opacity:0.04});
  const wireframe = new THREE.Mesh(new THREE.SphereGeometry(R, 20, 16), wireMat);
  membrane.add(wireframe);
  membrane.userData = { id: 'membrane', type: 'organelle' };
  clickables.push(membrane);
  g.add(membrane);

  // Cytoplasm glow
  const cytoMat = new THREE.MeshPhysicalMaterial({
    color:0xf0f0eb, transparent:true, opacity:0.15, roughness:0.8, side: THREE.BackSide
  });
  const cyto = new THREE.Mesh(new THREE.SphereGeometry(R*0.98, 24, 24), cytoMat);
  g.add(cyto);

  // Nucleus
  const nucMat = mat(COLORS.nucleus, {transparent:true, opacity:0.35, clearcoat:0.4});
  const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), nucMat);
  nucleus.position.set(-0.1, 0.1, 0.05); nucleus.castShadow = true;
  nucleus.userData = { id: 'nucleus', type: 'organelle' };
  clickables.push(nucleus);
  g.add(nucleus);

  // Nuclear envelope lines
  const envMat = new THREE.MeshBasicMaterial({color:COLORS.nucleus, wireframe:true, transparent:true, opacity:0.08});
  const envWire = new THREE.Mesh(new THREE.SphereGeometry(0.72, 12, 10), envMat);
  envWire.position.copy(nucleus.position);
  g.add(envWire);

  // Nucleolus
  const nucMat2 = mat(COLORS.nucleolus, {emissive:COLORS.nucleolus, emissiveIntensity:0.1});
  const nucleolus = new THREE.Mesh(new THREE.SphereGeometry(0.2, 20, 20), nucMat2);
  nucleolus.position.set(-0.05, 0.2, 0.15); nucleolus.castShadow = true;
  nucleolus.userData = { id: 'nucleolus', type: 'organelle' };
  clickables.push(nucleolus);
  g.add(nucleolus);

  // Nucleolus emission particles (ribosome subunits being produced)
  const rpMat = new THREE.MeshPhysicalMaterial({color:COLORS.ribosome, emissive:COLORS.ribosome, emissiveIntensity:0.2, transparent:true, opacity:0.6});
  for (let i = 0; i < 15; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.025 + Math.random()*0.02, 6, 6), rpMat);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 0.25 + Math.random()*0.4;
    p.position.set(nucleolus.position.x + r*Math.sin(phi)*Math.cos(theta), nucleolus.position.y + r*Math.cos(phi), nucleolus.position.z + r*Math.sin(phi)*Math.sin(theta));
    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.002, (Math.random()-0.5)*0.002, (Math.random()-0.5)*0.002), origin: nucleolus.position.clone(), t: Math.random()*5, speed: 0.001+Math.random()*0.003 };
    g.add(p);
    ribosomeParticles.push(p);
  }

  // Mitochondria (several)
  const mitoMat = mat(COLORS.mitochondria, {clearcoat:0.3});
  const mitoPositions = [[0.6,0.6,-0.3], [-0.7,-0.4,0.6], [0.5,-0.7,-0.4], [-0.5,0.9,0.5], [0.8,-0.1,0.7], [-0.8,-0.7,-0.5]];
  mitoPositions.forEach((pos, idx) => {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, 0.35, 12), mitoMat);
    body.rotation.x = Math.PI/2;
    body.castShadow = true;
    group.add(body);
    const bulge = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 10), mitoMat);
    bulge.position.x = 0.12; bulge.scale.set(1,1,0.8);
    group.add(bulge);
    const bulge2 = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 10), mitoMat);
    bulge2.position.x = -0.13; bulge2.scale.set(1,1,0.8);
    group.add(bulge2);
    // cristae
    for (let i = 0; i < 3; i++) {
      const crest = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.01, 6, 10), mat(COLORS.mitochondria, {opacity:0.3, transparent:true}));
      crest.position.x = -0.1 + i*0.08; crest.rotation.y = Math.PI/2; crest.rotation.x = 0.3;
      group.add(crest);
    }
    group.position.set(pos[0], pos[1], pos[2]);
    const theta = Math.random()*Math.PI*2;
    group.rotation.set(Math.random()*0.5, theta, Math.random()*0.5);
    group.userData = { id: 'mitochondria', type: 'organelle', idx };
    clickables.push(group);
    g.add(group);
    // pulse data
    group.userData.pulsePhase = Math.random()*Math.PI*2;
  });

  // Rough ER
  const rerGroup = new THREE.Group();
  const rerMat = mat(COLORS.roughER, {transparent:true, opacity:0.3, clearcoat:0.3});
  const rerPos = [-0.6, -0.3, -0.2];
  rerGroup.position.set(rerPos[0], rerPos[1], rerPos[2]);
  for (let i = 0; i < 4; i++) {
    const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.35-i*0.03, 0.35-i*0.03, 0.04, 16), rerMat);
    disc.position.y = -0.2 + i*0.09;
    disc.rotation.x = Math.sin(i)*0.15;
    disc.castShadow = true;
    rerGroup.add(disc);
    // Ribosomes on surface
    for (let j = 0; j < 12; j++) {
      const theta2 = Math.random()*Math.PI*2;
      const r = 0.32 - i*0.02;
      const rp = new THREE.Mesh(new THREE.SphereGeometry(0.022, 5,5), mat(COLORS.ribosome));
      rp.position.set(r*Math.cos(theta2), -0.2 + i*0.09, r*Math.sin(theta2));
      rerGroup.add(rp);
    }
  }
  rerGroup.userData = { id: 'roughER', type: 'organelle' };
  clickables.push(rerGroup);
  g.add(rerGroup);

  // Smooth ER
  const serGroup = new THREE.Group();
  const serMat = mat(COLORS.smoothER, {transparent:true, opacity:0.25});
  const serPos = [0.7, -0.5, 0.4];
  serGroup.position.set(serPos[0], serPos[1], serPos[2]);
  const points = [];
  for (let i = 0; i < 20; i++) {
    const t = i/20;
    points.push(new THREE.Vector3(Math.sin(t*Math.PI*4)*0.3, Math.cos(t*Math.PI*3)*0.25, (t-0.5)*0.5));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const tubeGeo = new THREE.TubeGeometry(curve, 30, 0.025, 6, false);
  const tubeMesh = new THREE.Mesh(tubeGeo, serMat);
  tubeMesh.castShadow = true;
  serGroup.add(tubeMesh);
  // branches
  for (let b = 0; b < 3; b++) {
    const pts2 = [];
    for (let i = 0; i < 8; i++) {
      pts2.push(new THREE.Vector3(Math.sin(i*1.2 + b)*0.15, Math.cos(i*0.9 + b)*0.15, (i/8-0.5)*0.4));
    }
    const c2 = new THREE.CatmullRomCurve3(pts2);
    const tg = new THREE.TubeGeometry(c2, 15, 0.018, 5, false);
    const tm = new THREE.Mesh(tg, serMat);
    serGroup.add(tm);
  }
  serGroup.userData = { id: 'smoothER', type: 'organelle' };
  clickables.push(serGroup);
  g.add(serGroup);

  // Golgi Apparatus
  const golgiGroup = new THREE.Group();
  const golgiMat = mat(COLORS.golgi, {transparent:true, opacity:0.35, clearcoat:0.4});
  golgiGroup.position.set(-0.3, -0.6, -0.6);
  for (let i = 0; i < 5; i++) {
    const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.28 - i*0.02, 0.28 - i*0.02, 0.035, 16), golgiMat);
    disc.position.y = -0.15 + i*0.06;
    disc.rotation.x = Math.sin(i*0.8)*0.1 - 0.1;
    disc.castShadow = true;
    golgiGroup.add(disc);
  }
  // Vesicles
  const vesMat = mat(COLORS.golgi, {transparent:true, opacity:0.25});
  for (let i = 0; i < 6; i++) {
    const ves = new THREE.Mesh(new THREE.SphereGeometry(0.03+Math.random()*0.02, 6,6), vesMat);
    const ang = Math.random()*Math.PI*2;
    const r = 0.3 + Math.random()*0.1;
    ves.position.set(r*Math.cos(ang), -0.05+Math.random()*0.1, r*Math.sin(ang));
    ves.userData = { ang, r, speed: 0.3+Math.random()*0.3, phase: Math.random()*Math.PI*2, idx: i };
    golgiGroup.add(ves);
    vesicleParticles.push(ves);
  }
  golgiGroup.userData = { id: 'golgi', type: 'organelle' };
  clickables.push(golgiGroup);
  g.add(golgiGroup);

  // Ribosomes (floating in cytoplasm)
  const ribMat = mat(COLORS.ribosome, {emissive:COLORS.ribosome, emissiveIntensity:0.05});
  for (let i = 0; i < 60; i++) {
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 0.3 + Math.random()*(R*0.75);
    const pos = new THREE.Vector3(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
    // Skip if inside nucleus
    if (pos.distanceTo(nucleus.position) < 0.75) continue;
    const rib = new THREE.Mesh(new THREE.SphereGeometry(0.028, 6,6), ribMat);
    rib.position.copy(pos);
    rib.castShadow = true;
    rib.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.004, (Math.random()-0.5)*0.004, (Math.random()-0.5)*0.004), phase: Math.random()*Math.PI*2 };
    g.add(rib);
    ribosomes.push(rib);
  }

  // Lysosomes
  const lysMat = mat(COLORS.lysosome, {clearcoat:0.4});
  const lysPositions = [[0.9,-0.2,-0.5], [-0.4,0.8,0.3], [0.3,-0.8,0.6], [-0.7,-0.3,-0.7]];
  lysPositions.forEach(pos => {
    const lys = new THREE.Mesh(new THREE.SphereGeometry(0.1 + Math.random()*0.04, 12,12), lysMat);
    lys.position.set(pos[0], pos[1], pos[2]);
    lys.castShadow = true;
    lys.userData = { id: 'lysosome', type: 'organelle' };
    clickables.push(lys);
    g.add(lys);
  });

  // Peroxisomes
  const perMat = mat(COLORS.peroxisome, {transparent:true, opacity:0.5});
  for (let i = 0; i < 3; i++) {
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 0.8 + Math.random()*0.6;
    const per = new THREE.Mesh(new THREE.SphereGeometry(0.06+Math.random()*0.02, 8,8), perMat);
    per.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
    per.userData = { id: 'peroxisome', type: 'organelle' };
    clickables.push(per);
    g.add(per);
  }

  // Centrioles (animal only)
  if (type === 'animal') {
    const centGroup = new THREE.Group();
    const centMat2 = mat(COLORS.centriole, {clearcoat:0.2});
    for (let ring = 0; ring < 2; ring++) {
      const cg = new THREE.Group();
      for (let i = 0; i < 9; i++) {
        const ang = (i/9)*Math.PI*2;
        for (let k = 0; k < 3; k++) {
          const t = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.15, 4), centMat2);
          t.position.set(0.11*Math.cos(ang), 0.11*Math.sin(ang), (k-1)*0.025);
          t.rotation.z = -ang;
          cg.add(t);
        }
      }
      cg.position.y = ring === 0 ? 0 : 0.05;
      cg.rotation.x = ring === 0 ? 0 : Math.PI/2.5;
      centGroup.add(cg);
    }
    centGroup.position.set(0.6, -0.7, 0.5);
    centGroup.userData = { id: 'centriole', type: 'organelle' };
    clickables.push(centGroup);
    g.add(centGroup);
  }

  // --- PLANT-SPECIFIC ---
  if (type === 'plant') {
    // Cell Wall
    const cwMat = new THREE.MeshPhysicalMaterial({
      color:0xb2bec3, transparent:true, opacity:0.06, roughness:0.6,
      side: THREE.DoubleSide, depthWrite: false
    });
    const cw = new THREE.Mesh(new THREE.SphereGeometry(R*1.06, 32, 32), cwMat);
    const cwWire = new THREE.MeshBasicMaterial({color:0xb2bec3, wireframe:true, transparent:true, opacity:0.04});
    const cwW = new THREE.Mesh(new THREE.SphereGeometry(R*1.06, 16, 12), cwWire);
    cw.add(cwW);
    cw.userData = { id: 'cellWall', type: 'organelle' };
    clickables.push(cw);
    g.add(cw);

    // Chloroplasts
    const chlMat = mat(COLORS.chloroplast, {clearcoat:0.3, emissive:COLORS.chloroplast, emissiveIntensity:0.05});
    const chlPositions = [[0.5,0.3,0.8], [-0.6,0.6,-0.6], [0.7,-0.7,0.2], [-0.8,-0.3,0.5], [0.2,0.9,-0.3], [-0.3,-0.8,-0.5]];
    chlPositions.forEach((pos, idx) => {
      const cg = new THREE.Group();
      const body = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12,12), chlMat);
      body.scale.set(1.3, 0.9, 1);
      body.castShadow = true;
      cg.add(body);
      // Thylakoid stacks (grana)
      for (let i = 0; i < 4; i++) {
        const stack = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.015, 8), mat(0x00a87a, {transparent:true, opacity:0.3}));
        stack.position.set((Math.random()-0.5)*0.1, (Math.random()-0.5)*0.08, (Math.random()-0.5)*0.1);
        cg.add(stack);
      }
      cg.position.set(pos[0], pos[1], pos[2]);
      cg.rotation.set(Math.random()*0.5, Math.random()*Math.PI*2, Math.random()*0.3);
      cg.userData = { id: 'chloroplast', type: 'organelle', idx };
      clickables.push(cg);
      g.add(cg);
      chloroplasts.push(cg);
    });

    // Central Vacuole
    const vacMat = new THREE.MeshPhysicalMaterial({
      color:COLORS.vacuole, transparent:true, opacity:0.06, roughness:0.1,
      side: THREE.DoubleSide
    });
    const vac = new THREE.Mesh(new THREE.SphereGeometry(R*0.45, 24, 24), vacMat);
    vac.position.set(0.3, -0.2, 0.2);
    const vacWire = new THREE.MeshBasicMaterial({color:COLORS.vacuole, wireframe:true, transparent:true, opacity:0.03});
    const vacW = new THREE.Mesh(new THREE.SphereGeometry(R*0.45, 12, 10), vacWire);
    vacW.position.copy(vac.position);
    g.add(vacW);
    vac.userData = { id: 'vacuole', type: 'organelle' };
    clickables.push(vac);
    g.add(vac);

    // Plasmodesmata representation (small channels on cell wall)
    for (let i = 0; i < 8; i++) {
      const theta = Math.random()*Math.PI*2;
      const phi = Math.acos(2*Math.random()-1);
      const pd = new THREE.Mesh(
        new THREE.CylinderGeometry(0.015, 0.015, 0.1, 4),
        mat(COLORS.plasmodesmata, {transparent:true, opacity:0.15})
      );
      pd.position.set(R*1.06*Math.sin(phi)*Math.cos(theta), R*1.06*Math.cos(phi), R*1.06*Math.sin(phi)*Math.sin(theta));
      pd.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta)));
      g.add(pd);
    }
  }

  // Reset camera if needed
  controls.target.set(0,0,0);
}

// --- RAYCASTER ---
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onClick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left)/rect.width)*2 - 1;
  pointer.y = -((event.clientY - rect.top)/rect.height)*2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const meshes = [];
  clickables.forEach(obj => {
    obj.traverse(child => { if(child.isMesh) meshes.push(child); });
  });

  const intersects = raycaster.intersectObjects(meshes, false);
  if (intersects.length > 0) {
    let hit = intersects[0].object;
    let target = hit;
    while(target.parent && !target.parent.userData?.id) target = target.parent;
    const id = target.parent?.userData?.id || hit.userData?.id;
    if (id) showInfo(id);
    return;
  }
  // Click empty space to toggle autoRotate
  controls.autoRotate = !controls.autoRotate;
}

// --- SHOW INFO ---
function showInfo(id) {
  const data = DATA[cellType][id];
  if (!data) return;

  // Highlight
  clickables.forEach(obj => {
    obj.traverse(child => {
      if(child.isMesh && child.material && child.material.color) {
        child.material._origColor = child.material._origColor || child.material.color.getHex();
        if (obj.userData.id === id || obj === clickables.find(c => c.userData.id === id)) {
          child.material.color.setHex(0xffffff);
          child.material.emissive = child.material.emissive || new THREE.Color(0x000000);
          child.material.emissive.setHex(0xffffff);
          child.material.emissiveIntensity = 0.15;
        } else {
          child.material.color.setHex(child.material._origColor);
          child.material.emissive && child.material.emissive.setHex(0x000000);
          child.material.emissiveIntensity = 0;
        }
      }
    });
  });

  selectedId = id;
  document.getElementById('pIcon').textContent = data.icon;
  document.getElementById('pIcon').style.background = data.color + '22';
  document.getElementById('pName').textContent = `${data.name}  ·  ${data.en}`;
  document.getElementById('pPronounce').textContent = data.pronounce;
  document.getElementById('pEnName').textContent = data.en;
  document.getElementById('pFunction').textContent = data.func;
  document.getElementById('pStructure').textContent = data.struct;
  document.getElementById('pFact').textContent = data.fact;
  document.getElementById('infoPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('show');
}

function closeInfo() {
  document.getElementById('infoPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('show');
  clickables.forEach(obj => {
    obj.traverse(child => {
      if(child.isMesh && child.material && child.material._origColor) {
        child.material.color.setHex(child.material._origColor);
        child.material.emissive && child.material.emissive.setHex(0x000000);
        child.material.emissiveIntensity = 0;
      }
    });
  });
  selectedId = null;
}

// --- LEGEND ---
function updateLegend(type) {
  const el = document.getElementById('legend');
  const keys = Object.keys(DATA[type]);
  el.innerHTML = keys.map(k => {
    const d = DATA[type][k];
    return `<div class="legend-item" data-id="${k}"><span class="legend-dot" style="background:${d.color}"></span>${d.name} (${d.en})</div>`;
  }).join('');
  el.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => showInfo(item.dataset.id));
  });
}

// --- TOGGLE ---
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cellType = btn.dataset.type;
    closeInfo();
    buildCell(cellType);
    updateLegend(cellType);
    showToast(`เปลี่ยนเป็น ${btn.textContent.trim()}`);
  });
});

// --- EVENTS ---
renderer.domElement.addEventListener('click', onClick);
document.getElementById('closePanel').addEventListener('click', closeInfo);
document.getElementById('panelOverlay').addEventListener('click', closeInfo);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (selectedId) closeInfo();
    else showToast('คลิกที่ออแกเนลล์เพื่อดูรายละเอียด');
  }
  if (e.code === 'Escape') closeInfo();
});

// --- TOAST ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1500);
}

// --- RESIZE ---
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// --- INIT ---
buildCell('animal');
updateLegend('animal');

// --- ANIMATION LOOP ---
function animate() {
  requestAnimationFrame(animate);
  animTime += 0.01;
  controls.update();

  // Ribosomes floating
  ribosomes.forEach(r => {
    r.position.x += r.userData.vel.x;
    r.position.y += r.userData.vel.y;
    r.position.z += r.userData.vel.z;
    if (r.position.length() > 1.9 || r.position.length() < 0.3) {
      r.userData.vel.negate();
    }
  });

  // Nucleolus emission - particles floating out
  ribosomeParticles.forEach(p => {
    p.userData.t += p.userData.speed;
    const dir = new THREE.Vector3().copy(p.position).sub(p.userData.origin).normalize();
    p.position.add(dir.multiplyScalar(p.userData.speed));
    if (p.position.length() > 1.5) {
      p.position.copy(p.userData.origin);
      const theta = Math.random()*Math.PI*2;
      const phi = Math.acos(2*Math.random()-1);
      const r = 0.25 + Math.random()*0.1;
      p.position.set(p.userData.origin.x + r*Math.sin(phi)*Math.cos(theta), p.userData.origin.y + r*Math.cos(phi), p.userData.origin.z + r*Math.sin(phi)*Math.sin(theta));
    }
  });

  // Mitochondria pulse
  clickables.forEach(c => {
    if (c.userData.id === 'mitochondria' && c.children.length > 0) {
      const s = 1 + Math.sin(animTime*2 + (c.userData.pulsePhase||0))*0.02;
      c.scale.set(s, s, s);
    }
  });

  // Chloroplasts rotate
  chloroplasts.forEach(c => {
    c.rotation.y += 0.003;
    c.rotation.x += 0.001;
  });

  // Vesicles at golgi
  vesicleParticles.forEach(v => {
    v.userData.ang += 0.008 * v.userData.speed;
    const r = v.userData.r + Math.sin(animTime*0.5 + v.userData.phase)*0.03;
    v.position.set(r*Math.cos(v.userData.ang), -0.05 + Math.sin(animTime*0.7 + v.userData.phase)*0.04, r*Math.sin(v.userData.ang));
  });

  renderer.render(scene, camera);
}

animate();

// Disable autoRotate on interaction, re-enable after 8s
let autoTimer;
renderer.domElement.addEventListener('pointerdown', () => {
  controls.autoRotate = false;
  clearTimeout(autoTimer);
});
renderer.domElement.addEventListener('pointerup', () => {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { controls.autoRotate = true; }, 8000);
});

showToast('🧬 คลิกที่ออแกเนลล์เพื่อดูรายละเอียด');

</script>
