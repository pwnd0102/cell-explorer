<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Prompt',-apple-system,'Segoe UI',sans-serif;background:#0a0a0f;overflow:hidden;height:100vh;color:#fff}
#container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.header{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none;text-shadow:0 2px 20px rgba(0,0,0,0.3)}

.toggle-wrap{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:0;background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:30px;padding:3px}
.toggle-btn{padding:7px 20px;border:none;background:transparent;border-radius:26px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.3s;font-family:inherit;letter-spacing:0.5px}
.toggle-btn.active{background:rgba(255,255,255,0.1);color:#f0ece4;box-shadow:0 1px 10px rgba(0,0,0,0.2)}
.toggle-btn:hover:not(.active){color:rgba(255,255,255,0.5)}
.info-panel{position:fixed;right:-440px;top:0;width:420px;height:100%;z-index:20;background:rgba(10,10,15,0.85);backdrop-filter:blur(30px);border-left:1px solid rgba(255,255,255,0.04);padding:36px;overflow-y:auto;transition:right 0.5s cubic-bezier(0.16,1,0.3,1)}
.info-panel.open{right:0}
.info-panel .close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);cursor:pointer;font-size:16px;color:rgba(255,255,255,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.info-panel .close:hover{background:rgba(255,255,255,0.1);color:#fff}
.info-panel .org-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.info-panel .org-name{font-size:22px;font-weight:600;margin-bottom:2px;line-height:1.3;color:#f0ece4}
.info-panel .en-name{font-size:14px;font-weight:400;color:rgba(255,255,255,0.3);margin-bottom:4px}
.info-panel .org-pronounce{font-size:12px;color:rgba(255,255,255,0.2);margin-bottom:16px;font-style:italic}
.info-panel .org-section{margin-bottom:20px}
.info-panel .org-section label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.2);display:block;margin-bottom:6px}
.info-panel .org-section p{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.6)}
.close-panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:15;display:none}
.close-panel-overlay.show{display:block}
.legend{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:92vw}
.legend-item{display:flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(255,255,255,0.04);backdrop-filter:blur(8px);border-radius:16px;border:1px solid rgba(255,255,255,0.03);font-size:10px;color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s}
.legend-item:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast{position:fixed;top:120px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:30;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);color:#f0ece4;padding:10px 24px;border-radius:30px;font-size:12px;opacity:0;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,0.04)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){.info-panel{width:100%;right:-100%;padding:24px}.header h1{font-size:16px}.toggle-btn{padding:5px 12px;font-size:11px}.legend{bottom:10px;gap:3px}.legend-item{font-size:9px;padding:2px 7px}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
</style>

const container=document.getElementById('container');

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.8;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

// Gradient background
const bgCanvas=document.createElement('canvas');

// --- STATE ---
let cellType='animal';
let cellGroup=new THREE.Group();scene.add(cellGroup);
let clickables=[];
let ribosomes=[],riboParticles=[],vesicles=[],chloroplasts=[];
let animTime=0;

function mat(color,opts={}){
  return new THREE.MeshPhysicalMaterial({
    color,roughness:opts.roughness||0.2,metalness:opts.metalness||0.0,
    transparent:opts.transparent||false,opacity:opts.opacity||1,
    clearcoat:opts.clearcoat||0.1,clearcoatRoughness:0.2,
    emissive:opts.emissive||new THREE.Color(0x000000),
    emissiveIntensity:opts.emissiveIntensity||0,
    side:opts.side||THREE.FrontSide,
    ...opts
  });
}

// --- BUILD CELL ---
function buildCell(type){
  while(cellGroup.children.length)cellGroup.remove(cellGroup.children[0]);
  clickables=[];ribosomes=[];riboParticles=[];vesicles=[];chloroplasts=[];
  const g=cellGroup;

  const R=2.0;

  // Ground shadow
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(12,12),
    new THREE.ShadowMaterial({opacity:0.08,color:0x000000}));
  ground.rotation.x=-Math.PI/2;ground.position.y=-R-0.3;ground.receiveShadow=true;
  g.add(ground);

  // Cytoplasm emissive glow
  const cytoMat=new THREE.MeshPhysicalMaterial({
    color:0x1a1a24,transparent:true,opacity:0.12,
    roughness:0.8,side:THREE.BackSide,
    emissive:0x2233aa,emissiveIntensity:0.02
  });
  const cyto=new THREE.Mesh(new THREE.SphereGeometry(R*0.98,32,32),cytoMat);
  g.add(cyto);

  // === MEMBRANE ===
  const memMat=new THREE.MeshPhysicalMaterial({
    color:0x8899bb,transparent:true,opacity:0.04,
    roughness:0.0,metalness:0.1,clearcoat:0.8,
    side:THREE.DoubleSide,depthWrite:false
  });
  const mem=new THREE.Mesh(new THREE.SphereGeometry(R,48,48),memMat);
  mem.userData={id:'membrane',type:'organelle'};
  clickables.push(mem);g.add(mem);

  // Membrane inner glow
  const innerGlow=new THREE.MeshPhysicalMaterial({
    color:0x4488ff,transparent:true,opacity:0.02,
    roughness:0.0,side:THREE.BackSide,emissive:0x4488ff,emissiveIntensity:0.05
  });
  const inner=new THREE.Mesh(new THREE.SphereGeometry(R*0.98,32,32),innerGlow);
  g.add(inner);

  // === CYTOSKELETON (microtubules) ===
  const mtMat=new THREE.MeshPhysicalMaterial({
    color:0x8899bb,transparent:true,opacity:0.04,roughness:0.3,emissive:0x6688cc,emissiveIntensity:0.02
  });
  for(let i=0;i<80;i++){
    const len=0.4+Math.random()*1.8;
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.006,len,3),mtMat);
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=0.3+Math.random()*R*0.7;
    t.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    t.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),
      new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize());
    g.add(t);
  }

  // === NUCLEUS ===
  const nucMat=mat(COLORS.nucleus,{transparent:true,opacity:0.3,clearcoat:0.5,
    emissive:COLORS.nucleus,emissiveIntensity:0.05});
  const nucleus=new THREE.Mesh(new THREE.SphereGeometry(0.65,48,48),nucMat);
  nucleus.position.set(-0.08,0.08,0.05);nucleus.castShadow=true;
  nucleus.userData={id:'nucleus',type:'organelle'};
  clickables.push(nucleus);g.add(nucleus);

  // Nucleus inner glow
  const nucInner=mat(COLORS.nucleus,{transparent:true,opacity:0.08,
    emissive:COLORS.nucleus,emissiveIntensity:0.1,side:THREE.BackSide});
  const nucInnerM=new THREE.Mesh(new THREE.SphereGeometry(0.62,32,32),nucInner);
  nucInnerM.position.copy(nucleus.position);
  g.add(nucInnerM);

  // Nuclear pores
  const poreMat=mat(0x8899bb,{transparent:true,opacity:0.08,clearcoat:0.3});
  for(let i=0;i<30;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const p=new THREE.Mesh(new THREE.TorusGeometry(0.04,0.008,6,12),poreMat);
    p.position.set(0.65*Math.sin(phi)*Math.cos(theta)+nucleus.position.x,
      0.65*Math.cos(phi)+nucleus.position.y,
      0.65*Math.sin(phi)*Math.sin(theta)+nucleus.position.z);
    p.lookAt(0,0,0);
    g.add(p);
  }

  // === NUCLEOLUS ===
  const nucMat2=mat(COLORS.nucleolus,{clearcoat:0.4,
    emissive:COLORS.nucleolus,emissiveIntensity:0.15});
  const nucs=new THREE.Mesh(new THREE.SphereGeometry(0.18,24,24),nucMat2);
  nucs.position.set(-0.02,0.18,0.12);nucs.castShadow=true;
  nucs.userData={id:'nucleolus',type:'organelle'};
  clickables.push(nucs);g.add(nucs);

  // Nucleolus emission particles
  const rpMat=mat(COLORS.ribosome,{transparent:true,opacity:0.5,
    emissive:COLORS.ribosome,emissiveIntensity:0.3});
  for(let i=0;i<20;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.015+Math.random()*0.01,5,5),rpMat);
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=0.22+Math.random()*0.35;
    p.position.set(nucs.position.x+r*Math.sin(phi)*Math.cos(theta),
      nucs.position.y+r*Math.cos(phi),
      nucs.position.z+r*Math.sin(phi)*Math.sin(theta));
    p.userData={origin:nucs.position.clone(),speed:0.0005+Math.random()*0.002,t:Math.random()*5};
    g.add(p);riboParticles.push(p);
  }

  // === MITOCHONDRIA ===
  const mitoMat=mat(COLORS.mitochondria,{clearcoat:0.4,roughness:0.15,
    emissive:COLORS.mitochondria,emissiveIntensity:0.03});
  const mPos=[[0.5,0.5,-0.3],[-0.6,-0.35,0.5],[0.4,-0.6,-0.4],[-0.4,0.8,0.4],[0.7,-0.1,0.6],[-0.7,-0.6,-0.4]];
  mPos.forEach((p,i)=>{
    const grp=new THREE.Group();
    // Body - use torus + spheres for bean shape
    const body=new THREE.Mesh(new THREE.TorusGeometry(0.13,0.08,10,16),mitoMat);
    body.scale.set(1.3,0.8,0.8);body.rotation.y=Math.PI/2;
    body.castShadow=true;grp.add(body);
    // Cristae (inner folds)
    const crisMat=mat(COLORS.mitochondria,{transparent:true,opacity:0.15,
      emissive:COLORS.mitochondria,emissiveIntensity:0.05});
    for(let j=0;j<5;j++){
      const c=new THREE.Mesh(new THREE.TorusGeometry(0.07,0.006,5,10),crisMat);
      c.position.x=-0.09+j*0.04;c.rotation.y=Math.PI/2;c.rotation.x=0.2;
      c.scale.set(1,1.8,0.8);
      grp.add(c);
    }
    grp.position.set(p[0],p[1],p[2]);
    grp.rotation.set(Math.random()*0.8,Math.random()*Math.PI*2,Math.random()*0.5);
    grp.userData={id:'mitochondria',type:'organelle',idx:i,pulsePhase:Math.random()*Math.PI*2};
    clickables.push(grp);g.add(grp);
  });

  // === ROUGH ER ===
  const rerMat=mat(COLORS.roughER,{transparent:true,opacity:0.15,clearcoat:0.3,
    emissive:COLORS.roughER,emissiveIntensity:0.03});
  const rerGrp=new THREE.Group();
  rerGrp.position.set(-0.5,-0.25,-0.2);
  for(let i=0;i<6;i++){
    const w=0.3-i*0.015;
    const disc=new THREE.Mesh(new THREE.CylinderGeometry(w,w*0.9,0.03,20),rerMat);
    disc.position.y=-0.25+i*0.08;disc.rotation.x=Math.sin(i*0.7)*0.12;
    disc.castShadow=true;rerGrp.add(disc);
    // Ribosomes on ER
    const rMat=mat(COLORS.ribosome,{emissive:COLORS.ribosome,emissiveIntensity:0.1});
    for(let j=0;j<14;j++){
      const a=Math.random()*Math.PI*2;
      const rr=w*0.85*Math.sqrt(Math.random());
      const rib=new THREE.Mesh(new THREE.SphereGeometry(0.015,5,5),rMat);
      rib.position.set(rr*Math.cos(a),-0.25+i*0.08,rr*Math.sin(a));
      rerGrp.add(rib);
    }
  }
  rerGrp.userData={id:'roughER',type:'organelle'};
  clickables.push(rerGrp);g.add(rerGrp);

  // === SMOOTH ER ===
  const serMat=mat(COLORS.smoothER,{transparent:true,opacity:0.12,clearcoat:0.2,
    emissive:COLORS.smoothER,emissiveIntensity:0.02});
  const serGrp=new THREE.Group();
  serGrp.position.set(0.6,-0.4,0.35);
  for(let b=0;b<5;b++){
    const pts=[];
    for(let i=0;i<12;i++){
      const t=i/12;
      pts.push(new THREE.Vector3(
        Math.sin(t*Math.PI*5+b*1.3)*0.25,
        Math.cos(t*Math.PI*4+b*0.9)*0.2,
        (t-0.5)*0.45
      ));
    }
    const curve=new THREE.CatmullRomCurve3(pts);
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,24,0.018,5,false),serMat);
    serGrp.add(tube);
  }
  serGrp.userData={id:'smoothER',type:'organelle'};
  clickables.push(serGrp);g.add(serGrp);

  // === GOLGI ===
  const golMat=mat(COLORS.golgi,{transparent:true,opacity:0.2,clearcoat:0.5,
    emissive:COLORS.golgi,emissiveIntensity:0.03});
  const golGrp=new THREE.Group();
  golGrp.position.set(-0.2,-0.55,-0.5);
  for(let i=0;i<6;i++){
    const w=0.25-i*0.015;
    const disc=new THREE.Mesh(new THREE.CylinderGeometry(w,w*1.2,0.028,20),golMat);
    disc.position.y=-0.12+i*0.05;disc.rotation.x=Math.sin(i*0.6)*0.08-0.08;
    disc.castShadow=true;golGrp.add(disc);
  }
  // Vesicles
  const vesMat=mat(COLORS.golgi,{transparent:true,opacity:0.15,
    emissive:COLORS.golgi,emissiveIntensity:0.05});
  for(let i=0;i<10;i++){
    const v=new THREE.Mesh(new THREE.SphereGeometry(0.018+Math.random()*0.012,6,6),vesMat);
    const a=Math.random()*Math.PI*2,rr=0.28+Math.random()*0.12;
    v.position.set(rr*Math.cos(a),(Math.random()-0.5)*0.15,rr*Math.sin(a));
    v.userData={ang:a,r:rr,speed:0.2+Math.random()*0.3,phase:Math.random()*Math.PI*2};
    golGrp.add(v);vesicles.push(v);
  }
  golGrp.userData={id:'golgi',type:'organelle'};
  clickables.push(golGrp);g.add(golGrp);

  // === RIBOSOMES (floating) ===
  const ribMat=mat(COLORS.ribosome,{emissive:COLORS.ribosome,emissiveIntensity:0.08});
  for(let i=0;i<80;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=0.3+Math.random()*R*0.7;
    const pos=new THREE.Vector3(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    if(pos.distanceTo(nucleus.position)<0.7)continue;
    const rib=new THREE.Mesh(new THREE.SphereGeometry(0.018,5,5),ribMat);
    rib.position.copy(pos);rib.castShadow=true;
    rib.userData={vel:new THREE.Vector3((Math.random()-0.5)*0.003,(Math.random()-0.5)*0.003,(Math.random()-0.5)*0.003).multiplyScalar(0.3)};
    g.add(rib);ribosomes.push(rib);
  }

  // === LYSOSOMES ===
  const lysMat=mat(COLORS.lysosome,{clearcoat:0.5,roughness:0.1,
    emissive:COLORS.lysosome,emissiveIntensity:0.05});
  [[0.8,-0.15,-0.4],[-0.35,0.7,0.25],[0.25,-0.7,0.5],[-0.6,-0.25,-0.6],[-0.5,0.2,-0.7]].forEach(p=>{
    const l=new THREE.Mesh(new THREE.SphereGeometry(0.07+Math.random()*0.02,12,12),lysMat);
    l.position.set(p[0],p[1],p[2]);l.castShadow=true;
    l.userData={id:'lysosome',type:'organelle'};
    clickables.push(l);g.add(l);
  });

  // === PEROXISOMES ===
  const perMat=mat(COLORS.peroxisome,{transparent:true,opacity:0.35,
    emissive:COLORS.peroxisome,emissiveIntensity:0.05});
  for(let i=0;i<4;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=0.7+Math.random()*0.6;
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.04+Math.random()*0.01,8,8),perMat);
    p.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    p.userData={id:'peroxisome',type:'organelle'};
    clickables.push(p);g.add(p);
  }

  // === CENTRIOLES (animal only) ===
  if(type==='animal'){
    const cMat=mat(COLORS.centriole,{clearcoat:0.2});
    const cGrp=new THREE.Group();
    for(let ring=0;ring<2;ring++){
      const cg=new THREE.Group();
      for(let i=0;i<9;i++){
        const a=(i/9)*Math.PI*2;
        for(let k=0;k<3;k++){
          const t=new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.005,0.12,4),cMat);
          t.position.set(0.09*Math.cos(a),0.09*Math.sin(a),(k-1)*0.02);
          t.rotation.z=-a;
          cg.add(t);
        }
      }
      cg.position.y=ring===0?0:0.04;
      cg.rotation.x=ring===0?0:Math.PI/2.5;
      cGrp.add(cg);
    }
    cGrp.position.set(0.5,-0.6,0.4);
    cGrp.userData={id:'centriole',type:'organelle'};
    clickables.push(cGrp);g.add(cGrp);
  }

  // === PLANT-SPECIFIC ===
  if(type==='plant'){
    const cwMat=new THREE.MeshPhysicalMaterial({
      color:0xb2bec3,transparent:true,opacity:0.03,
      roughness:0.6,side:THREE.DoubleSide,depthWrite:false
    });
    const cw=new THREE.Mesh(new THREE.SphereGeometry(R*1.08,48,48),cwMat);
    cw.userData={id:'cellWall',type:'organelle'};
    clickables.push(cw);g.add(cw);

    // Cell wall wireframe overlay
    const cwW=new THREE.Mesh(new THREE.SphereGeometry(R*1.08,16,12),
      new THREE.MeshBasicMaterial({color:0x8899bb,wireframe:true,transparent:true,opacity:0.02}));
    g.add(cwW);

    // Chloroplasts
    const chMat=mat(COLORS.chloroplast,{clearcoat:0.4,
      emissive:COLORS.chloroplast,emissiveIntensity:0.06});
    const chPos=[[0.4,0.3,0.7],[-0.5,0.5,-0.5],[0.6,-0.6,0.15],[-0.7,-0.25,0.45],[0.15,0.8,-0.25],[-0.25,-0.7,-0.45]];
    chPos.forEach((p,i)=>{
      const cg=new THREE.Group();
      const body=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,16),chMat);
      body.scale.set(1.4,0.9,1.1);body.castShadow=true;
      cg.add(body);
      // Thylakoid stacks
      const thMat=mat(0x00a87a,{transparent:true,opacity:0.2,emissive:0x00a87a,emissiveIntensity:0.05});
      for(let j=0;j<5;j++){
        const s=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.01,6),thMat);
        s.position.set((Math.random()-0.5)*0.08,(Math.random()-0.5)*0.06,(Math.random()-0.5)*0.08);
        cg.add(s);
      }
      cg.position.set(p[0],p[1],p[2]);
      cg.rotation.set(Math.random()*0.5,Math.random()*Math.PI*2,Math.random()*0.3);
      cg.userData={id:'chloroplast',type:'organelle',idx:i};
      clickables.push(cg);g.add(cg);chloroplasts.push(cg);
    });

    // Vacuole
    const vMat=new THREE.MeshPhysicalMaterial({
      color:COLORS.vacuole,transparent:true,opacity:0.03,
      roughness:0.0,side:THREE.DoubleSide,
      emissive:COLORS.vacuole,emissiveIntensity:0.02
    });
    const vac=new THREE.Mesh(new THREE.SphereGeometry(R*0.5,32,32),vMat);
    vac.position.set(0.25,-0.15,0.15);
    vac.userData={id:'vacuole',type:'organelle'};
    clickables.push(vac);g.add(vac);

    // Vacuole inner glow
    const vGlow=mat(COLORS.vacuole,{transparent:true,opacity:0.02,
      emissive:COLORS.vacuole,emissiveIntensity:0.04,side:THREE.BackSide});
    const vg=new THREE.Mesh(new THREE.SphereGeometry(R*0.48,24,24),vGlow);
    vg.position.copy(vac.position);
    g.add(vg);

    // Plasmodesmata
    const pdMat=mat(COLORS.plasmodesmata,{transparent:true,opacity:0.08});
    for(let i=0;i<12;i++){
      const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
      const pd=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,0.08,4),pdMat);
      pd.position.set(R*1.08*Math.sin(phi)*Math.cos(theta),R*1.08*Math.cos(phi),R*1.08*Math.sin(phi)*Math.sin(theta));
      pd.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(Math.sin(phi)*Math.cos(theta),Math.cos(phi),Math.sin(phi)*Math.sin(theta)));
      g.add(pd);
    }
  }
}

// --- RAYCASTER ---
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2();

function onClick(event){
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((event.clientX-rect.left)/rect.width)*2-1;
  pointer.y=-((event.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const meshes=[];
  clickables.forEach(obj=>{obj.traverse(child=>{if(child.isMesh)meshes.push(child)})});
  const intersects=raycaster.intersectObjects(meshes,false);
  if(intersects.length>0){
    let hit=intersects[0].object;
    let target=hit;
    while(target.parent&&!target.parent.userData?.id)target=target.parent;
    const id=target.parent?.userData?.id||hit.userData?.id;
    if(id)showInfo(id);
    return;
  }
  controls.autoRotate=!controls.autoRotate;
}

// --- INFO ---
function showInfo(id){
  const data=DATA[cellType][id];
  if(!data)return;
  clickables.forEach(obj=>{
    obj.traverse(child=>{
      if(child.isMesh&&child.material&&child.material.color){
        child.material._origC=child.material._origC||child.material.color.getHex();
        child.material._origEI=child.material._origEI||child.material.emissiveIntensity||0;
        if(obj.userData.id===id){
          child.material.color.setHex(0xffffff);
          child.material.emissive&&child.material.emissive.setHex(0xffffff);
          child.material.emissiveIntensity=0.2;
        }else{
          child.material.color.setHex(child.material._origC);
          child.material.emissive&&child.material.emissive.setHex(0x000000);
          child.material.emissiveIntensity=child.material._origEI;
        }
      }
    });
  });
  document.getElementById('pIcon').textContent=data.icon;
  document.getElementById('pIcon').style.background=data.color+'33';
  document.getElementById('pName').textContent=data.name+'  ·  '+data.en;
  document.getElementById('pEnName').textContent=data.en;
  document.getElementById('pPronounce').textContent=data.pronounce;
  document.getElementById('pFunction').textContent=data.func;
  document.getElementById('pStructure').textContent=data.struct;
  document.getElementById('pFact').textContent=data.fact;
  document.getElementById('infoPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('show');
}

function closeInfo(){
  document.getElementById('infoPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('show');
  clickables.forEach(obj=>{
    obj.traverse(child=>{
      if(child.isMesh&&child.material&&child.material._origC){
        child.material.color.setHex(child.material._origC);
        child.material.emissive&&child.material.emissive.setHex(0x000000);
        child.material.emissiveIntensity=child.material._origEI||0;
      }
    });
  });
}

// --- LEGEND ---
function updateLegend(type){
  const el=document.getElementById('legend');
  el.innerHTML=Object.keys(DATA[type]).map(k=>{
    const d=DATA[type][k];
    return `<div class="legend-item" data-id="${k}"><span class="legend-dot" style="background:${d.color}"></span>${d.name}</div>`;
  }).join('');
  el.querySelectorAll('.legend-item').forEach(item=>{
    item.addEventListener('click',()=>showInfo(item.dataset.id));
  });
}

// --- TOGGLE ---
document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cellType=btn.dataset.type;
    closeInfo();
    buildCell(cellType);
    updateLegend(cellType);
    showToast('เปลี่ยนเป็น '+btn.textContent.trim());
  });
});

// --- EVENTS ---
renderer.domElement.addEventListener('click',onClick);
document.getElementById('closePanel').addEventListener('click',closeInfo);
document.getElementById('panelOverlay').addEventListener('click',closeInfo);
document.addEventListener('keydown',e=>{
  if(e.code==='Escape')closeInfo();
  if(e.code==='Space'&&!e.repeat){e.preventDefault();showToast('คลิกที่ออแกเนลล์เพื่อดูรายละเอียด')}
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500);
}

// --- RESIZE ---
window.addEventListener('resize',()=>{
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  composer.setSize(w,h);
});

// --- INIT ---
buildCell('animal');
updateLegend('animal');

// --- ANIMATION ---
function animate(){
  requestAnimationFrame(animate);
  animTime+=0.008;
  controls.update();

  // Ribosomes float
  ribosomes.forEach(r=>{
    r.position.x+=r.userData.vel.x;
    r.position.y+=r.userData.vel.y;
    r.position.z+=r.userData.vel.z;
    if(r.position.length()>1.9||r.position.length()<0.3)r.userData.vel.negate();
  });

  // Nucleolus emission
  riboParticles.forEach(p=>{
    p.userData.t+=p.userData.speed*1.5;
    const dir=new THREE.Vector3().copy(p.position).sub(p.userData.origin).normalize();
    p.position.add(dir.multiplyScalar(p.userData.speed*1.5));
    if(p.position.length()>1.3){
      p.position.copy(p.userData.origin);
      const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
      const r=0.22+Math.random()*0.08;
      p.position.set(p.userData.origin.x+r*Math.sin(phi)*Math.cos(theta),
        p.userData.origin.y+r*Math.cos(phi),
        p.userData.origin.z+r*Math.sin(phi)*Math.sin(theta));
    }
  });

  // Mitochondria pulse
  clickables.forEach(c=>{
    if(c.userData.id==='mitochondria'){
      const s=1+Math.sin(animTime*2+(c.userData.pulsePhase||0))*0.015;
      c.scale.set(s,s,s);
    }
  });

  // Golgi vesicles orbit
  vesicles.forEach(v=>{
    v.userData.ang+=0.006*v.userData.speed;
    const r=v.userData.r+Math.sin(animTime*0.5+v.userData.phase)*0.02;
    v.position.set(r*Math.cos(v.userData.ang),Math.sin(animTime*0.6+v.userData.phase)*0.03,r*Math.sin(v.userData.ang));
  });

  // Chloroplasts rotate
  chloroplasts.forEach(c=>{c.rotation.y+=0.002;c.rotation.x+=0.001});

  composer.render();
}

animate();

let autoTimer;
renderer.domElement.addEventListener('pointerdown',()=>{controls.autoRotate=false;clearTimeout(autoTimer)});
renderer.domElement.addEventListener('pointerup',()=>{
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{controls.autoRotate=true},8000);
});

showToast('🧬 คลิกออแกเนลล์เพื่อดูรายละเอียด');
</script>
